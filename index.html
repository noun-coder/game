<!DOCTYPE html>
<html>
  <head>
    <title>Rock, Paper, Scissors</title>
    <link rel="stylesheet"
    href="styles/10-rock-paper-scissor.css">
  </head>
  <body>
    <p class="title">Rock, Paper, Scissors!</p>
    <p>Choose your move:</p>
    
    <button onclick="playGame('rock')" class="r"><img src="image/rock-emoji.png" class="imove"></button>
    <button onclick="playGame('paper')" class="p"><img src="image/paper-emoji.png" class="imove"></button>
    <button onclick="playGame('scissors')" class="s"><img src="image/scissors-emoji.png" class="imove"></button>
    <p class="jsresult cssresult"></p>
    <p class="jsmove"></p>
    <p class="jsscore score"></p>
    <button onclick="score.wins = 0; score.losses = 0; score.tie = 0; localStorage.removeItem('score'); 
    updateScore();resetScore();"class="reset">Reset Score</button>

    <script src="scripts/10-rock-paper-scissor.js"></script>
  </body>
</html>
